version: "3.9"

services:
  backend:
    image: golang:1.23
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "go mod tidy && go run ./cmd/nchatd"
    environment:
      - NCHAT_HTTP_ADDR=:8080
      - NCHAT_GRPC_ADDR=:9090
      - NCHAT_DB_PATH=/app/backend/data/nchat.db
      - NCHAT_CORS_ORIGIN=*
    ports:
      - "8080:8080"
      - "9090:9090"

  frontend:
    image: node:22
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_NCHAT_API_BASE=http://localhost:8080
      - VITE_NCHAT_WS_URL=ws://localhost:8080/ws
    ports:
      - "5173:5173"
    depends_on:
      - backend
